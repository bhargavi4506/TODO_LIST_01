<!DOCTYPE html>
<html lang="en">
    <head>
        <title>TO-DO List</title>
        <link rel="stylesheet" href="style.css" />
        <link rel="icon" href="icon.png" type="image/x-icon">
    </head>
<body>
    <div id="todo-container">
    <div id="header">
        <h1> 🌙To Do List🌙 </h1>
    </div>
    <div id="todo-form">
        <input
            type="text"
            id="input-box"
            placeholder="✨ Add your task..."
        />

        <button id="input-button" onclick="addTask()">
        Add
        </button>
    </div>
    <h2>Task List</h2>
    <ul id="list-container"></ul>
    </div>
    <hr />
    <div class="counter-container">
    <div id="task-counters">
        Completed: <span id="completed-counter">0</span> | Uncompleted:
        <span id="uncompleted-counter">0</span>
    </div>
    </div>
    <div class="sticker">🌈☃️</div>

    <script type="text/javascript" src="script.js"></script>
    <footer class="footer">
    <p>
        <span class="nowrap">Copyright &copy; <time id="year"></time></span>
        <span class="nowrap">Bhargavi</span>
    </p>
</footer>
</body>
</html>
